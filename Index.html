<!doctype html>
<html lang="mn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebAR Lab</title>

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        header {
            padding: 10px;
            background: #f5f5f5;
        }

        model-viewer {
            width: 100vw;
            height: 90vh;
            background: #eaeaea;
        }
    </style>
</head>
<body>

<header>
    <h2>WebAR 3D Model</h2>
    <p>AR товчийг дарж камераар байрлуулна.</p>
</header>

<model-viewer
    src="assets/model.glb"
    ar
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    alt="3D Model">
</model-viewer>

</body>
</html>
